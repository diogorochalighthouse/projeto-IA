services:
  postgres:
    image: postgres:16-alpine
    container_name: docmind-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docmind
    ports:
      - '5433:5433'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d docmind']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
